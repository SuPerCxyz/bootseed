<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BootSeed 管理门户 - 登录</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
.login-box { background: #fff; border-radius: 12px; padding: 2.5rem 2rem;
  width: 380px; max-width: 92vw; box-shadow: 0 8px 40px rgba(0,0,0,0.25);
  text-align: center; }
.login-box h1 { margin: 0 0 0.3rem; font-size: 1.5rem; color: #1e3a5f; }
.login-box p { color: #64748b; font-size: 0.9rem; margin: 0 0 1.5rem; }
.login-box input { width: 100%; padding: 0.75rem 1rem; font-size: 1rem;
  border: 1px solid #d1d5db; border-radius: 8px; outline: none;
  transition: border-color 0.15s; }
.login-box input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
.login-box button { width: 100%; padding: 0.75rem; margin-top: 1rem;
  background: #2563eb; color: #fff; border: none; border-radius: 8px;
  font-size: 1rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s; }
.login-box button:hover { background: #1d4ed8; }
.login-box button:disabled { opacity: 0.6; cursor: not-allowed; }
.login-box .error { color: #dc2626; font-size: 0.85rem; margin-top: 0.75rem; display: none; }
</style>
</head>
<body>
<div class="login-box">
  <h1>BootSeed</h1>
  <p>服务端管理门户</p>
  <form id="login-form">
    <input id="password-input" type="password" placeholder="管理口令" autocomplete="current-password" required>
    <button type="submit" id="login-btn">进入门户</button>
  </form>
  <div class="error" id="login-error"></div>
</div>
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  const pw = document.getElementById('password-input').value.trim();
  btn.disabled = true;
  btn.textContent = '验证中...';
  err.style.display = 'none';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: pw }),
    });
    if (r.ok) {
      window.location.href = '/';
    } else {
      const d = await r.json();
      err.textContent = d.error || '口令错误';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = '网络错误';
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = '进入门户';
});
</script>
</body>
</html>
