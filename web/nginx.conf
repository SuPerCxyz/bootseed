# BootSeed Web (bootseed-web) Nginx 主配置
# 作用：提供 PXE 引导文件、Alpine 内核/initramfs/modloop、镜像清单及大体积镜像文件。
# 静态根目录 /usr/share/nginx/html 由 docker-compose 以只读方式绑定挂载 data/http。

# 以 nginx 默认前台用户运行；容器内由基础镜像决定用户。
worker_processes  auto;

# 错误日志写入 stderr（容器标准错误），便于 docker logs 采集。
error_log  /dev/stderr  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    # 引入标准 MIME 类型映射。
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 访问日志写入 stdout（容器标准输出）。
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /dev/stdout  main;

    # 大文件传输优化：sendfile 零拷贝 + tcp_nopush 合并报文头。
    # 注意：不要关闭 Range 支持，nginx 默认对静态文件支持 HTTP Range，
    # 这是大镜像断点续传/分片下载的关键。
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # 大镜像可能被写盘很慢的节点(嵌套虚拟化/慢盘)长时间拉取。
    # nginx 默认 send_timeout=60s：当慢客户端的接收缓冲满、nginx 单次发送阻塞
    # 超过该时长时会关闭连接，导致大文件被截断(客户端侧表现为 sha 不一致)。
    # 这里大幅放宽发送/读取超时，并允许优雅 lingering，保证大镜像可完整下发。
    send_timeout            3600s;
    client_body_timeout     3600s;
    lingering_timeout       30s;
    lingering_time          3600s;

    # 镜像文件可能非常大，关闭请求体大小限制（仅影响上传，静态下载不受限）。
    client_max_body_size  0;

    server {
        listen       80;
        server_name  _;

        root   /usr/share/nginx/html;
        autoindex  off;

        # docker 内嵌 DNS，按请求惰性解析 bootseed-server，避免其未就绪时 nginx 启动失败。
        resolver 127.0.0.11 valid=10s ipv6=off;

        # 健康检查端点，供 docker-compose healthcheck 使用（nginx 自身）。
        location = /healthz {
            return 200 'ok';
            add_header  Content-Type  text/plain;
        }

        # .efi / .kpxe 引导固件按二进制流下发。
        location ~* \.(efi|kpxe)$ {
            default_type  application/octet-stream;
        }

        # iPXE 脚本以纯文本下发，便于客户端解析与调试。
        location ~* \.ipxe$ {
            default_type  text/plain;
        }

        # 镜像清单 index.json：禁止任何缓存。
        location = /images/index.json {
            add_header  Cache-Control  "no-store";
            expires     -1;
        }

        # manifest.json：禁止缓存。
        location ~ /manifest\.json$ {
            add_header  Cache-Control  "no-store";
            expires     -1;
        }

        # 静态下载目录（boot/alpine/images），保留 Range/大文件。
        location /boot/   { try_files $uri =404; }
        location /alpine/ { try_files $uri =404; }
        location /images/ { try_files $uri =404; }

        # 管理 API → 反代到 bootseed-server（含浏览器上传大镜像，关闭请求缓冲、放宽超时）。
        location /api/ {
            set $portal_upstream bootseed-server:9090;
            proxy_pass              http://$portal_upstream;
            proxy_set_header        Host $host;
            proxy_set_header        X-Forwarded-For $remote_addr;
            proxy_request_buffering off;
            client_max_body_size    0;
            proxy_read_timeout      3600s;
            proxy_send_timeout      3600s;
        }

        # 门户页面（/、/app.js、/style.css 等）→ 反代到 bootseed-server。
        location / {
            set $portal_upstream bootseed-server:9090;
            proxy_pass        http://$portal_upstream;
            proxy_set_header  Host $host;
            proxy_set_header  X-Forwarded-For $remote_addr;
        }
    }
}
