# 实验室专用 dnsmasq:单实例同时承担 DHCP + iPXE 引导路由 + TFTP.
# 用于在单宿主机受限环境验证 BootSeed 引导链(TFTP->iPXE->HTTP->Alpine->agent).
# 注意:这不是 BootSeed 产品的 ProxyDHCP 配置,仅为本机验证用.
port=0
interface=virbr0
except-interface=lo
bind-dynamic
log-dhcp
# 真实 DHCP 地址池(模拟"我也管理 DHCP"的部署模式)
dhcp-range=192.168.122.50,192.168.122.150,12h
dhcp-option=3,192.168.122.1
dhcp-option=6,8.8.8.8
# TFTP
enable-tftp
tftp-root=/var/lib/tftp
# 架构识别(Option 93)
dhcp-match=set:bios,option:client-arch,0
dhcp-match=set:efi_x64,option:client-arch,7
dhcp-match=set:efi_x64,option:client-arch,9
dhcp-match=set:efi_arm64,option:client-arch,11
# iPXE 识别
dhcp-userclass=set:ipxe,iPXE
# 已是 iPXE -> 走 HTTP boot.ipxe;否则按架构下发 iPXE 二进制
dhcp-boot=tag:ipxe,http://192.168.122.1:8088/boot/boot.ipxe
dhcp-boot=tag:bios,tag:!ipxe,x86_64/undionly.kpxe
dhcp-boot=tag:efi_x64,tag:!ipxe,x86_64-uefi/snponly.efi
dhcp-boot=tag:efi_arm64,tag:!ipxe,aarch64/snponly.efi
