# BootSeed Docker Compose
# 默认拉起两个服务：
#   bootseed-pxe   : dnsmasq ProxyDHCP + TFTP（host 网络）
#   bootseed-web   : Nginx HTTP（提供 boot.ipxe / Alpine 启动文件 / 镜像）
# bootseed-builder 仅在构建阶段使用，不在此文件中常驻。
#
# 注意：
#   - 不要在 dnsmasq.conf 里写普通 DHCP 地址池；必须是 ProxyDHCP。
#   - bootseed-pxe 必须使用 host 网络才能监听 DHCP/PXE 广播。

services:
  bootseed-pxe:
    image: bootseed/pxe:latest
    container_name: bootseed-pxe
    build:
      context: ./pxe
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - PXE_INTERFACE=${PXE_INTERFACE}
      - PXE_SUBNET=${PXE_SUBNET}
      - PXE_SERVER_IP=${PXE_SERVER_IP}
      - HTTP_PORT=${HTTP_PORT}
    volumes:
      - ./data/tftp:/var/lib/tftp:ro
      - ./data/http/boot:/var/lib/http-boot:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep dnsmasq >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  bootseed-web:
    image: bootseed/web:latest
    container_name: bootseed-web
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - bootseed-server
    ports:
      - "${HTTP_PORT}:80"
    environment:
      - PXE_SERVER_IP=${PXE_SERVER_IP}
      - HTTP_PORT=${HTTP_PORT}
      - AGENT_PORT=${AGENT_PORT}
      - X86_KERNEL_CONSOLE=${X86_KERNEL_CONSOLE}
      - ARM64_KERNEL_CONSOLE=${ARM64_KERNEL_CONSOLE}
      - NETWORK_DEVICE_TIMEOUT=${NETWORK_DEVICE_TIMEOUT}
      - STORAGE_DEVICE_TIMEOUT=${STORAGE_DEVICE_TIMEOUT}
    volumes:
      - ./data/http:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # 服务端门户后端：总览 + 镜像增删 + 节点登记（bbolt 持久化）。
  # Nginx(bootseed-web) 反代 / 与 /api/* 到本服务；本服务需对 ./data 读写。
  bootseed-server:
    image: bootseed/server:latest
    container_name: bootseed-server
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATA_ROOT=/data
      - PORTAL_LISTEN=:9090
      - PORTAL_TOKEN=${PORTAL_TOKEN}
      - NODE_ONLINE_TIMEOUT=${NODE_ONLINE_TIMEOUT}
      - PXE_SERVER_IP=${PXE_SERVER_IP}
      - HTTP_PORT=${HTTP_PORT}
      - PXE_INTERFACE=${PXE_INTERFACE}
      - PXE_SUBNET=${PXE_SUBNET}
      - SUPPORTED_ARCHITECTURES=${SUPPORTED_ARCHITECTURES}
      - ALPINE_VERSION=${ALPINE_VERSION}
      - AGENT_VERSION=${AGENT_VERSION}
      - IPXE_REF=${IPXE_REF}
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:9090/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
